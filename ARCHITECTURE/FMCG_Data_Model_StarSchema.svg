<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>FMCG Data Model - Star Schema</title>
  <desc>Star schema showing fact_orders table in center with four dimension tables (dim_date, dim_customers, dim_products, dim_gross_price) connected by foreign key relationships</desc>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-family: Arial, sans-serif; font-size: 14px; font-weight: 500; }
      .ts { font-family: Arial, sans-serif; font-size: 12px; font-weight: 400; }
      .node { cursor: pointer; }
      .c-coral rect { fill: #D85A30; stroke: #993C1D; }
      .c-coral text { fill: #FFFFFF; }
      .c-teal rect { fill: #1D9E75; stroke: #0F6E56; }
      .c-teal text { fill: #FFFFFF; }
    </style>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="35" text-anchor="middle" fill="#000000">FMCG Data Model - Star Schema</text>
  <text class="ts" x="340" y="55" text-anchor="middle" fill="#666666">Gold layer (fmcg.gold)</text>

  <!-- Fact table (center) -->
  <g class="node c-coral">
    <rect x="240" y="140" width="200" height="140" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="165" text-anchor="middle">fact_orders</text>
    <text class="ts" x="340" y="185" text-anchor="middle">Central fact table</text>
    
    <!-- Column indicators -->
    <line x1="250" y1="195" x2="430" y2="195" stroke="#999999" stroke-width="0.5"/>
    <text class="ts" x="258" y="210" fill="#CCCCCC">Keys:</text>
    <text class="ts" x="258" y="225" fill="#CCCCCC">date, product_code,</text>
    <text class="ts" x="258" y="240" fill="#CCCCCC">customer_code</text>
    <text class="ts" x="258" y="255" fill="#CCCCCC">Metrics:</text>
    <text class="ts" x="258" y="270" fill="#CCCCCC">sold_quantity</text>
  </g>

  <!-- Dimension: Date (top) -->
  <g class="node c-teal">
    <rect x="260" y="20" width="160" height="100" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="45" text-anchor="middle">dim_date</text>
    <text class="ts" x="340" y="60" text-anchor="middle">Temporal dimension</text>
    <line x1="270" y1="70" x2="410" y2="70" stroke="#999999" stroke-width="0.5"/>
    <text class="ts" x="278" y="85" fill="#E6F1FB">year, month, quarter</text>
    <text class="ts" x="278" y="100" fill="#E6F1FB">date_key, month_name</text>
  </g>

  <!-- Dimension: Customers (left) -->
  <g class="node c-teal">
    <rect x="20" y="240" width="160" height="120" rx="8" stroke-width="0.5"/>
    <text class="th" x="100" y="265" text-anchor="middle">dim_customers</text>
    <text class="ts" x="100" y="280" text-anchor="middle">Customer segment</text>
    <line x1="30" y1="290" x2="170" y2="290" stroke="#999999" stroke-width="0.5"/>
    <text class="ts" x="38" y="305" fill="#E6F1FB">customer_code (PK)</text>
    <text class="ts" x="38" y="320" fill="#E6F1FB">market, platform</text>
    <text class="ts" x="38" y="335" fill="#E6F1FB">channel, customer</text>
  </g>

  <!-- Dimension: Products (right) -->
  <g class="node c-teal">
    <rect x="500" y="240" width="160" height="120" rx="8" stroke-width="0.5"/>
    <text class="th" x="580" y="265" text-anchor="middle">dim_products</text>
    <text class="ts" x="580" y="280" text-anchor="middle">Product hierarchy</text>
    <line x1="510" y1="290" x2="650" y2="290" stroke="#999999" stroke-width="0.5"/>
    <text class="ts" x="518" y="305" fill="#E6F1FB">product_code (PK)</text>
    <text class="ts" x="518" y="320" fill="#E6F1FB">division, category</text>
    <text class="ts" x="518" y="335" fill="#E6F1FB">product, variant</text>
  </g>

  <!-- Dimension: Pricing (bottom) -->
  <g class="node c-teal">
    <rect x="240" y="480" width="200" height="100" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="505" text-anchor="middle">dim_gross_price</text>
    <text class="ts" x="340" y="520" text-anchor="middle">Pricing dimension</text>
    <line x1="250" y1="530" x2="430" y2="530" stroke="#999999" stroke-width="0.5"/>
    <text class="ts" x="258" y="545" fill="#E6F1FB">product_code (FK)</text>
    <text class="ts" x="258" y="560" fill="#E6F1FB">year (temporal FK)</text>
    <text class="ts" x="258" y="575" fill="#E6F1FB">price_inr</text>
  </g>

  <!-- Relationships (lines) -->
  <!-- Date relationship -->
  <path d="M340 140L340 120" stroke="#888888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="ts" x="360" y="130" fill="#666666">ON date = month_start_date</text>

  <!-- Customer relationship -->
  <path d="M240 210L180 300" stroke="#888888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="ts" x="155" y="250" fill="#666666">FK: customer_code</text>

  <!-- Product relationship -->
  <path d="M440 210L500 300" stroke="#888888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="ts" x="495" y="250" fill="#666666">FK: product_code</text>

  <!-- Pricing relationship -->
  <path d="M340 280L340 480" stroke="#888888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="ts" x="360" y="380" fill="#666666">FK: product_code + year</text>

  <!-- Aggregation view -->
  <g>
    <rect x="20" y="630" width="640" height="70" rx="8" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.5"/>
    <text class="th" x="340" y="655" text-anchor="middle" fill="#000000">Analytical View: vw_fact_orders_enriched</text>
    <text class="ts" x="40" y="680" fill="#666666">Denormalized view joining all dimensions for reporting. Calculates derived metric: total_amount_inr = sold_quantity × price_inr</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="29" y="614" width="12" height="12" rx="2" fill="#D85A30"/>
    <text class="ts" x="50" y="625" fill="#000000">Fact Table</text>
    
    <rect x="194" y="614" width="12" height="12" rx="2" fill="#1D9E75"/>
    <text class="ts" x="215" y="625" fill="#000000">Dimension Tables</text>
    
    <line x1="430" y1="620" x2="460" y2="620" stroke="#888888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text class="ts" x="475" y="625" fill="#000000">Foreign Key Relationship</text>
  </g>
</svg>